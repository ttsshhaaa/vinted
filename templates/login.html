{% extends "base.html" %}
{% block title %}Login | Vinted Autopilot{% endblock %}
{% block content %}
<div class="grid" style="grid-template-columns: minmax(0, 560px); justify-content:center;">
  <div class="panel">
    <h1 style="margin-top:0;">Account Access</h1>
    <p class="muted">Вход доступен только для уже созданных аккаунтов. Новых пользователей теперь создаёт администратор из админ-панели.</p>
    <form method="post" class="card">
      <h2 style="margin-top:0;">Login</h2>
      <div style="margin-bottom:12px;">
        <label>Username</label>
        <input name="username" required>
      </div>
      <div style="margin-bottom:12px;">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
